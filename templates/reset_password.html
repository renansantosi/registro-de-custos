<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redefinir Senha — Registro Original de Custos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: white; border-radius: 16px; padding: 36px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,.1); border: 1px solid #e2e8f0; }
  .logo { font-size: 15px; font-weight: 800; color: #1e3a8a; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
  h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
  p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-group label { font-size: 13px; font-weight: 600; color: #0f172a; }
  .form-group input { padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; width: 100%; font-family: inherit; transition: border .15s; }
  .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .btn { width: 100%; padding: 13px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s; }
  .btn:hover { background: #1d4ed8; }
  .btn:disabled { opacity: .65; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .msg.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
  .msg.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
  .back { text-align: center; margin-top: 16px; font-size: 13px; color: #64748b; }
  .back a { color: #2563eb; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏠 Registro Original de Custos</div>

  {% if invalido %}
    <h1>Link inválido</h1>
    <p>Este link de redefinição é inválido ou já expirou. Solicite um novo na tela de login.</p>
    <div class="back"><a href="/login">Voltar ao login</a></div>
  {% else %}
    <h1>Nova senha</h1>
    <p>Digite sua nova senha abaixo.</p>
    <div id="msg"></div>
    <div class="form-group">
      <label>Nova Senha</label>
      <input type="password" id="senha_nova" placeholder="Min. 6 caracteres" />
    </div>
    <div class="form-group">
      <label>Confirmar Senha</label>
      <input type="password" id="senha_confirmar" placeholder="Repita a nova senha" />
    </div>
    <button class="btn" id="btn" onclick="doReset()"><span>Salvar Nova Senha</span></button>
    <div class="back"><a href="/login">Cancelar</a></div>

    <script>
    async function doReset() {
      const nova = document.getElementById('senha_nova').value;
      const conf = document.getElementById('senha_confirmar').value;
      const btn = document.getElementById('btn');
      const msgEl = document.getElementById('msg');
      msgEl.innerHTML = '';
      if (nova !== conf) { msgEl.innerHTML = '<div class="msg error">As senhas não conferem.</div>'; return; }
      if (nova.length < 6) { msgEl.innerHTML = '<div class="msg error">Mínimo 6 caracteres.</div>'; return; }
      btn.disabled = true; btn.querySelector('span').textContent = 'Salvando...';
      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: '{{ token }}', senha_nova: nova })
        });
        const data = await res.json();
        if (res.ok) {
          msgEl.innerHTML = '<div class="msg success">Senha redefinida! Redirecionando...</div>';
          setTimeout(() => window.location.href = '/login', 2000);
        } else {
          msgEl.innerHTML = `<div class="msg error">${data.error}</div>`;
          btn.disabled = false; btn.querySelector('span').textContent = 'Salvar Nova Senha';
        }
      } catch(e) {
        msgEl.innerHTML = '<div class="msg error">Erro de conexão.</div>';
        btn.disabled = false; btn.querySelector('span').textContent = 'Salvar Nova Senha';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
    </script>
  {% endif %}
</div>
</body>
</html>
